<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeaxMusic PiP</title>
    <link rel="stylesheet" href="../css/pip.css" />
    <script defer src="../js/pip.js"></script>
  </head>
  <body>
    <div class="pip-root">
      <button class="pip-close" id="pipClose" title="Cerrar">
        <i class="fas fa-times"></i>
      </button>
      <div class="pip-video-frame" id="pipFrame">
        <img id="pipVideo" alt="" draggable="false">
        <div class="pip-placeholder" id="pipPlaceholder">
          <i class="fas fa-compact-disc"></i>
          <span>Portada actual</span>
        </div>
      </div>
      <div class="pip-info-bar">
        <div class="pip-track-info">
          <span class="pip-title" id="pipTitle">Título</span>
          <span class="pip-artist" id="pipArtist">Artista</span>
        </div>
        <div class="pip-controls">
          <button id="pipPrev" title="Anterior"><i class="fas fa-backward"></i></button>
          <button id="pipPlay" title="Reproducir/Pausar"><i class="fas fa-play"></i></button>
          <button id="pipNext" title="Siguiente"><i class="fas fa-forward"></i></button>
        </div>
        <div class="pip-progress-container">
          <span class="pip-time" id="pipTime">0:00</span>
          <div class="pip-progress-bar" id="pipProgressBar">
            <div class="pip-progress-fill" id="pipProgressFill"></div>
          </div>
          <span class="pip-duration" id="pipDuration">0:00</span>
        </div>
      </div>
    </div>
  </body>
</html>
